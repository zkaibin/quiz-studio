<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Quiz Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 42px 36px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
        }

        .icon {
            font-size: 68px;
            margin-bottom: 18px;
            display: block;
        }

        h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        p {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .reset-form {
            margin-top: 20px;
            text-align: left;
            display: none;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .btn {
            display: inline-block;
            width: 100%;
            margin-top: 10px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.35);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .secondary-link {
            display: inline-block;
            margin-top: 16px;
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }

        .status {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.92rem;
            background: #f3f4f6;
            color: #374151;
            display: none;
        }

        .status.ok {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .status.err {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .status.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <span id="statusIcon" class="icon">🔐</span>
        <h1 id="statusTitle">Checking your reset link…</h1>
        <p id="statusMessage">Please wait while we verify your password reset request.</p>

        <form id="resetForm" class="reset-form" novalidate>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input id="newPassword" type="password" class="input-field" placeholder="At least 6 characters" />
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input id="confirmPassword" type="password" class="input-field" placeholder="Repeat your new password" />
            </div>
            <button id="resetPasswordBtn" type="submit" class="btn">Update Password</button>
        </form>

        <div id="statusBox" class="status"></div>
        <a href="index.html" class="secondary-link">Return to Quiz Studio</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
    (function () {
      'use strict';

      var client = null;
      var readyForReset = false;

      function $(id) { return document.getElementById(id); }

      function setStatus(message, kind) {
        var box = $('statusBox');
        if (!box) return;
        box.textContent = message;
        box.className = 'status';
        if (kind) {
          box.classList.add(kind);
        } else {
          box.classList.add('show');
        }
      }

      async function initializeRecovery() {
        var icon = $('statusIcon');
        var title = $('statusTitle');
        var message = $('statusMessage');
        var form = $('resetForm');

        if (!window.SUPABASE_CONFIG) {
          title.textContent = 'Configuration missing';
          message.textContent = 'Supabase configuration is not available on this page.';
          setStatus('Password reset cannot continue until the app configuration is loaded.', 'err');
          return;
        }

        client = window.SUPABASE_CLIENT || supabase.createClient(
          window.SUPABASE_CONFIG.url,
          window.SUPABASE_CONFIG.anonKey
        );
        window.SUPABASE_CLIENT = client;

        var params = new URLSearchParams(window.location.search);
        var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        var code = params.get('code');
        var flowType = params.get('type') || hashParams.get('type');
        var callbackError =
          params.get('error_description') ||
          hashParams.get('error_description') ||
          params.get('error') ||
          hashParams.get('error');

        if (callbackError) {
          title.textContent = 'Reset link error';
          message.textContent = 'This reset link could not be used.';
          setStatus(callbackError, 'err');
          return;
        }

        if (code) {
          var exchangeResult = await client.auth.exchangeCodeForSession(code);
          if (exchangeResult.error) {
            title.textContent = 'Reset link error';
            message.textContent = 'This reset link has expired or is invalid.';
            setStatus(exchangeResult.error.message, 'err');
            return;
          }
        } else {
          var sessionResult = await client.auth.getSession();
          if (sessionResult.error) {
            title.textContent = 'Reset link error';
            message.textContent = 'This reset link has expired or is invalid.';
            setStatus(sessionResult.error.message, 'err');
            return;
          }
        }

        var currentSession = await client.auth.getSession();
        if (currentSession.error || !currentSession.data.session) {
          title.textContent = 'Reset link error';
          message.textContent = 'No valid recovery session was found.';
          setStatus('Please request a fresh password reset email and try again.', 'err');
          return;
        }

        if (flowType && flowType !== 'recovery') {
          title.textContent = 'Wrong link type';
          message.textContent = 'This page only handles password reset links.';
          setStatus('Please use the account confirmation link for email verification instead.', 'err');
          return;
        }

        readyForReset = true;
        icon.textContent = '🔑';
        title.textContent = 'Set a new password';
        message.textContent = 'Enter your new password below to finish resetting your account.';
        form.style.display = 'block';
        setStatus('Your secure reset link is ready.', 'ok');
      }

      async function handleResetPassword(event) {
        event.preventDefault();
        if (!client || !readyForReset) {
          setStatus('This reset session is not ready. Please request a new reset email.', 'err');
          return;
        }

        var newPassword = $('newPassword').value;
        var confirmPassword = $('confirmPassword').value;
        var btn = $('resetPasswordBtn');

        if (!newPassword || newPassword.length < 6) {
          setStatus('Password must be at least 6 characters.', 'err');
          return;
        }

        if (newPassword !== confirmPassword) {
          setStatus('Passwords do not match.', 'err');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Updating password…';

        var result = await client.auth.updateUser({ password: newPassword });

        btn.disabled = false;
        btn.textContent = 'Update Password';

        if (result.error) {
          setStatus(result.error.message, 'err');
          return;
        }

        $('newPassword').value = '';
        $('confirmPassword').value = '';
        $('resetForm').style.display = 'none';
        $('statusIcon').textContent = '✅';
        $('statusTitle').textContent = 'Password updated';
        $('statusMessage').textContent = 'Your password has been reset successfully. You can now sign in with the new password.';
        setStatus('Password reset complete.', 'ok');
      }

      document.addEventListener('DOMContentLoaded', function () {
        $('resetForm').addEventListener('submit', handleResetPassword);
        initializeRecovery();
      });
    })();
    </script>
</body>
</html>
