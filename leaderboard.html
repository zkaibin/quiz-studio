<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Quiz Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=10">
    <style>
        .lb-wrap {
            max-width: 720px;
            margin: 0 auto;
        }

        .lb-card {
            background: #fff;
            border-radius: 14px;
            padding: 24px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .lb-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .lb-toolbar h2 {
            font-size: 1.15rem;
            color: #2c3e50;
            margin: 0;
        }

        .btn-refresh {
            padding: 8px 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #f3f4f6;
            color: #374151;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-refresh:hover { background: #e5e7eb; }

        .lb-msg {
            padding: 14px;
            border-radius: 8px;
            background: #f3f4f6;
            color: #374151;
            font-size: 0.93rem;
            margin-bottom: 16px;
        }

        .lb-msg.lb-msg-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .lb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.93rem;
        }

        .lb-table th {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 2px solid #e5e7eb;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .lb-table td {
            padding: 10px 10px;
            border-bottom: 1px solid #f3f4f6;
            vertical-align: middle;
        }

        .lb-table tr:last-child td { border-bottom: none; }

        .lb-row-me {
            background: #f0f9ff;
        }

        .lb-row-me td { font-weight: 600; }

        .lb-rank {
            font-size: 1.2rem;
            min-width: 48px;
            text-align: center;
        }

        .lb-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            overflow: hidden;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e5e7eb;
        }

        .lb-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lb-avatar-fallback {
            font-size: 1.3rem;
        }

        .lb-name {
            color: #2c3e50;
        }

        .lb-pts {
            font-weight: 700;
            color: #b45309;
        }

        .lb-quizzes {
            color: #6b7280;
        }

        .lb-you {
            display: inline-block;
            font-size: 0.72rem;
            background: #6366f1;
            color: white;
            border-radius: 20px;
            padding: 1px 8px;
            margin-left: 6px;
            font-weight: 600;
            vertical-align: middle;
        }

        .lb-empty {
            text-align: center;
            color: #9ca3af;
            padding: 30px;
        }

        .lb-note {
            margin-top: 16px;
            font-size: 0.82rem;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link" style="position: absolute; top: 20px; left: 20px; z-index: 1000; color: white; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 6px;">← Back to Home</a>

    <div class="container" style="max-width: 860px;">
        <header class="header">
            <h1>🏅 Leaderboard</h1>
            <p>Top 50 learners by total reward points</p>
        </header>

        <main style="padding: 30px 20px;">
            <div class="lb-wrap">
                <div class="lb-card">
                    <div class="lb-toolbar">
                        <h2>🏆 Top Rankings</h2>
                        <button id="refreshBtn" class="btn-refresh">🔄 Refresh</button>
                    </div>

                    <div id="lbMsg" class="lb-msg" style="display:none"></div>

                    <table class="lb-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Avatar</th>
                                <th>Name</th>
                                <th>Points</th>
                                <th>Quizzes</th>
                            </tr>
                        </thead>
                        <tbody id="lbTbody">
                            <tr><td colspan="5" style="padding:20px; color:#9ca3af;">Loading…</td></tr>
                        </tbody>
                    </table>

                    <p class="lb-note">Rankings update after each quiz. Only users who have completed at least one quiz appear here.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/nav-auth.js"></script>
    <script src="js/leaderboard.js"></script>
</body>
</html>
