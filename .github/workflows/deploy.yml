name: Create Supabase Config

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Supabase config
        run: |
          cat > js/supabase-config.js << 'EOF'
          window.SUPABASE_CONFIG = {
              url: '${{ secrets.SUPABASE_URL }}',
              anonKey: '${{ secrets.SUPABASE_ANON_KEY }}'
          };
          EOF
      
      - name: Commit and push config file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add js/supabase-config.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate Supabase config" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
