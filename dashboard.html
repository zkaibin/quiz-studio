<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Quiz Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=10">
    <style>
        .dash-wrap {
            max-width: 780px;
            margin: 0 auto;
        }

        .dash-card {
            background: #fff;
            border-radius: 14px;
            padding: 24px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .dash-card h2 {
            font-size: 1.15rem;
            color: #2c3e50;
            margin-bottom: 18px;
        }

        /* Stats row */
        .dash-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .dash-stat {
            flex: 1;
            min-width: 130px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 18px 16px;
            text-align: center;
            color: white;
        }

        .dash-stat-value {
            font-size: 2rem;
            font-weight: 800;
            display: block;
        }

        .dash-stat-label {
            font-size: 0.82rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* Subject table */
        .dash-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.93rem;
        }

        .dash-table th {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 2px solid #e5e7eb;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .dash-table td {
            padding: 10px 10px;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
        }

        .dash-table tr:last-child td {
            border-bottom: none;
        }

        /* Recent activity */
        .dash-activity-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
            gap: 12px;
            flex-wrap: wrap;
        }

        .dash-activity-item:last-child {
            border-bottom: none;
        }

        .dash-activity-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .dash-activity-subject {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95rem;
        }

        .dash-activity-date {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .dash-activity-score {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dash-activity-pts {
            font-size: 0.85rem;
            font-weight: 700;
            color: #b45309;
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 20px;
            padding: 2px 10px;
        }

        .score-badge {
            font-weight: 700;
            font-size: 0.9rem;
            padding: 3px 12px;
            border-radius: 20px;
        }

        .badge-excellent { background: #dcfce7; color: #166534; }
        .badge-good      { background: #dbeafe; color: #1e40af; }
        .badge-ok        { background: #fef9c3; color: #854d0e; }
        .badge-poor      { background: #fee2e2; color: #991b1b; }

        .dash-empty {
            color: #9ca3af;
            font-size: 0.93rem;
        }

        .dash-empty a {
            color: #6366f1;
        }

        /* Quick links */
        .dash-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .dash-link-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.93rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .dash-link-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .dash-link-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .dash-link-btn.secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .dash-link-btn.secondary:hover {
            background: #e5e7eb;
        }

        .dash-error {
            background: #fee2e2;
            color: #991b1b;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: none;
        }

        .dash-greeting {
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link" style="position: absolute; top: 20px; left: 20px; z-index: 1000; color: white; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 6px;">← Back to Home</a>

    <div class="container" style="max-width: 900px;">
        <header class="header">
            <h1>🏆 My Dashboard</h1>
            <p class="dash-greeting">Welcome back, <strong id="dashName">Learner</strong>!</p>
        </header>

        <main style="padding: 30px 20px;">
            <div class="dash-wrap">

                <div id="dashError" class="dash-error"></div>

                <!-- Summary Stats -->
                <div class="dash-card">
                    <h2>📊 Summary</h2>
                    <div class="dash-stats">
                        <div class="dash-stat">
                            <span class="dash-stat-value" id="totalPoints">—</span>
                            <span class="dash-stat-label">Total Points</span>
                        </div>
                        <div class="dash-stat">
                            <span class="dash-stat-value" id="totalQuizzes">—</span>
                            <span class="dash-stat-label">Quizzes Taken</span>
                        </div>
                        <div class="dash-stat">
                            <span class="dash-stat-value" id="leaderboardRank">—</span>
                            <span class="dash-stat-label">Leaderboard Rank</span>
                        </div>
                    </div>
                </div>

                <!-- Subject Breakdown -->
                <div class="dash-card">
                    <h2>📚 Subject Breakdown</h2>
                    <table class="dash-table">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Quizzes</th>
                                <th>Avg Score</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody id="subjectTbody">
                            <tr><td colspan="4">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- Recent Activity -->
                <div class="dash-card">
                    <h2>🕐 Recent Activity</h2>
                    <div id="recentActivity">Loading…</div>
                </div>

                <!-- Quick Links -->
                <div class="dash-card">
                    <h2>🔗 Quick Links</h2>
                    <div class="dash-links">
                        <a href="leaderboard.html" class="dash-link-btn primary">🏅 Leaderboard</a>
                        <a href="quiz-records.html" class="dash-link-btn secondary">📋 All Quiz Records</a>
                        <a href="profile.html" class="dash-link-btn secondary">👤 My Profile</a>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/nav-auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
