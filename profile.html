<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Quiz Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=10">
    <style>
        .profile-wrap {
            max-width: 640px;
            margin: 0 auto;
        }

        .profile-card {
            background: #fff;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .profile-card h2 {
            color: #2c3e50;
            margin-bottom: 6px;
            font-size: 1.3rem;
        }

        .profile-email-display {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #374151;
            font-size: 0.92rem;
        }

        .input-field {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        textarea.input-field {
            resize: vertical;
            min-height: 80px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .status-msg {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #f3f4f6;
            font-size: 0.9rem;
            min-height: 38px;
        }

        .status-msg.ok {
            background: #dcfce7;
            color: #166534;
        }

        .status-msg.err {
            background: #fee2e2;
            color: #991b1b;
        }

        .label-hint {
            font-weight: 400;
            color: #6b7280;
        }
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 0 0 20px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link" style="position: absolute; top: 20px; left: 20px; z-index: 1000; color: white; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 6px;">← Back to Home</a>

    <div class="container" style="max-width: 800px;">
        <header class="header">
            <h1>👤 My Profile</h1>
            <p>Manage your account details and password</p>
        </header>

        <main style="padding: 30px 20px;">
            <div class="profile-wrap">

                <!-- Profile Info Card -->
                <div class="profile-card">
                    <h2>Profile Information</h2>
                    <p class="profile-email-display">Signed in as: <strong id="profileEmail"></strong></p>
                    <hr class="divider">

                    <form id="profileForm" novalidate>
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input id="fullName" type="text" class="input-field" placeholder="e.g. Tan Wei Ming" />
                        </div>

                        <div class="form-group">
                            <label for="displayName">Display Name <span class="label-hint">(shown on quizzes)</span></label>
                            <input id="displayName" type="text" class="input-field" placeholder="e.g. Wei Ming" />
                        </div>

                        <div class="form-group">
                            <label for="favouriteSubject">Favourite Subject</label>
                            <select id="favouriteSubject" class="input-field">
                                <option value="">Select one</option>
                                <option value="Math">Math</option>
                                <option value="Science">Science</option>
                                <option value="English">English</option>
                                <option value="Chinese">Chinese</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="avatarUrl">Avatar URL <span class="label-hint">(optional link to your profile picture)</span></label>
                            <input id="avatarUrl" type="url" class="input-field" placeholder="https://example.com/avatar.png" />
                        </div>

                        <div class="form-group">
                            <label for="bio">About Me <span class="label-hint">(optional)</span></label>
                            <textarea id="bio" class="input-field" placeholder="A short description about yourself…"></textarea>
                        </div>

                        <div class="btn-row">
                            <button type="submit" class="btn btn-primary">Save Profile</button>
                        </div>
                        <div id="profileStatus" class="status-msg"></div>
                    </form>
                </div>

                <!-- Change Password Card -->
                <div class="profile-card">
                    <h2>Change Password</h2>
                    <hr class="divider">

                    <form id="passwordForm" novalidate>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input id="newPassword" type="password" class="input-field" placeholder="At least 6 characters" />
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input id="confirmPassword" type="password" class="input-field" placeholder="Repeat new password" />
                        </div>

                        <div class="btn-row">
                            <button type="submit" class="btn btn-primary">Change Password</button>
                        </div>
                        <div id="passwordStatus" class="status-msg"></div>
                    </form>
                </div>

                <!-- Sign Out -->
                <div class="profile-card">
                    <h2>Account</h2>
                    <hr class="divider">
                    <div class="btn-row">
                        <button onclick="window.location.href='quiz-records.html'" class="btn btn-secondary">📋 My Quiz Records</button>
                        <button id="signOutBtn" class="btn btn-danger">Sign Out</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/nav-auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
